<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Stackly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin_dashboard.css">
</head>
<body class="dashboard-body">
  
  <!-- Sidebar -->
  <aside class="sidebar admin-sidebar">
    <div class="sidebar-header">
      <a href="admin_dashboard.html" class="brand-link">
        <img src="images/logo.webp" alt="Stackly Logo" class="brand-logo">
      </a>
    </div>
    <ul class="nav flex-column sidebar-nav">
      <li class="nav-item">
        <a class="nav-link" href="admin_dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="admin_users.html"><i class="bi bi-people"></i> Manage Users</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="admin_projects.html"><i class="bi bi-building"></i> All Projects</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" href="admin_settings.html"><i class="bi bi-gear"></i> System Settings</a>
      </li>
      <li class="nav-item mt-auto">
        <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="dashboard-header d-flex justify-content-between align-items-center">
      <h3 class="mb-0 fw-bold text-white">System Settings</h3>
      <div class="user-profile d-flex align-items-center gap-3">
        <span class="text-white"><strong id="displayEmail">SuperUser</strong></span>
        <div class="avatar bg-danger text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"><i class="bi bi-shield-lock"></i></div>
      </div>
    </header>

    <div class="container-fluid p-4">
      <div class="row">
        <div class="col-lg-8">
          <div class="dashboard-card mb-4">
            <h5 class="text-dark mb-4">System Settings</h5>
            <form>
              <div class="mb-3">
                <label class="form-label text-muted">Company Name</label>
                <input type="text" class="form-control bg-transparent border-secondary text-dark" value="Stackly Construction">
              </div>
              <div class="mb-3">
                <label class="form-label text-muted">Support Email</label>
                <input type="email" class="form-control bg-transparent border-secondary text-dark" value="support@stackly.com">
              </div>
              <hr class="border-secondary my-4">
              <h6 class="text-dark mb-3">Notification Preferences</h6>
              <div class="form-check form-switch mb-3">
                <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="emailNotif" checked>
                <label class="form-check-label text-dark" for="emailNotif">Email Notifications</label>
              </div>
              <div class="form-check form-switch mb-4">
                <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="smsNotif">
                <label class="form-check-label text-dark" for="smsNotif">SMS Alerts (Critical only)</label>
              </div>
              <button type="button" class="btn btn-primary px-4">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const email = sessionStorage.getItem('userEmail');
    if (email) {
      document.getElementById('displayEmail').innerText = email;
    }
  });
</script>
</html>
