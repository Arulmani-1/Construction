<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal | Stackly Construction</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div id="page-loader"><div class="loader-brand">STACKLY<span>.</span></div><div class="loader-bar-container"><div class="loader-bar"></div></div></div>

  

  <section class="login-section">
    <!-- Background Video -->
    <video class="video-bg" autoplay muted loop playsinline>
      <source src="videos/video-1.mp4" type="video/mp4">
    </video>
    <div class="login-overlay"></div>
    
    <!-- Particles overlay -->
    <div id="particles-js" class="position-absolute top-0 start-0 w-100 h-100 z-0"></div>

    <!-- Login Card -->
    <div class="login-card interactive" data-aos="zoom-in" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-perspective="1000">
    <a href="index.html" class="login-brand"><img src="images/logo.webp" alt="Stackly Logo" style="height: 45px; width: auto; object-fit: contain;"></a>
    
    <div class="text-center mb-4">
      <h4 class="fw-bold">Client Portal</h4>
      <p class="small text-white-50">Sign in to track your project progress</p>
    </div>

    <form id="loginForm">
      <div class="mb-3 position-relative">
        <select id="roleSelect" class="form-select login-input custom-select" required>
          <option value="" disabled selected hidden>Select Role</option>
          <option value="user" class="text-dark">User</option>
          <option value="admin" class="text-dark">Admin</option>
        </select>
      </div>
      
      <div class="mb-3 position-relative">
        <input type="email" id="emailField" class="form-control login-input" placeholder="Email Address" required>
        <i class="bi bi-envelope input-icon pe-none"></i>
      </div>
      
      <div class="mb-3 position-relative">
        <input type="password" id="passwordField" class="form-control login-input" placeholder="Password" required>
        <i class="bi bi-eye-slash input-icon" id="togglePassword"></i>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input bg-transparent border-secondary" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Remember Me</label>
        </div>
        <a href="#" class="login-link small">Forgot Password?</a>
      </div>

      <button type="submit" class="btn w-100 btn-login d-flex align-items-center justify-content-center interactive" id="loginBtn">
        <span class="text">Sign In</span>
        <div class="loading-spinner"></div>
      </button>

      <div class="text-center mt-4">
        <p class="small mb-0 text-white-50">Don't have an account? <a href="signup.html" class="login-link fw-bold">Sign Up</a></p>
      </div>
    </form>
  </div>

  </section>

  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  
  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/scroll.js"></script>
  <script src="js/animation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Toggle Password Visibility
      const togglePassword = document.getElementById('togglePassword');
      const passwordField = document.getElementById('passwordField');
      
      togglePassword.addEventListener('click', () => {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        togglePassword.classList.toggle('bi-eye');
        togglePassword.classList.toggle('bi-eye-slash');
      });

      // Animated Validation & Loading Button
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const roleSelect = document.getElementById('roleSelect');
        const role = roleSelect ? roleSelect.value : null;
        const emailInput = document.getElementById('emailField');
        if (emailInput) sessionStorage.setItem('userEmail', emailInput.value);
        
        loginBtn.classList.add('loading');
        
        // Simulate API call
        setTimeout(() => {
          loginBtn.classList.remove('loading');
          
          if (role === 'admin') {
              window.location.href = 'admin_dashboard.html';
          } else {
              window.location.href = 'user_dashboard.html';
          }
        }, 1500);
      });

      // Initialize Particles
      if (document.getElementById('particles-js')) {
        particlesJS('particles-js', {
          "particles": {
            "number": { "value": 20 },
            "color": { "value": "#ffffff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.1 },
            "size": { "value": 2 },
            "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
            "move": { "enable": true, "speed": 1 }
          }
        });
      }
    });
  </script>
</body>
</html>
