<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found | Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Manrope:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/404.css">
</head>
<body>

  <div id="page-loader"><div class="loader-brand">STACKLY<span>.</span></div><div class="loader-bar-container"><div class="loader-bar"></div></div></div>

  <!-- 404 Section -->
  <section class="error-page-section d-flex align-items-center justify-content-center text-center position-relative min-vh-100">
    <div class="error-bg-overlay"></div>
    <div class="container position-relative z-2">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="error-content" data-aos="zoom-in">
            <h1 class="error-code text-warning mb-0">
              <span class="jump-digit" style="--delay: 0s">4</span><span class="jump-digit" style="--delay: 0.15s">0</span><span class="jump-digit" style="--delay: 0.3s">4</span>
            </h1>
            <h2 class="error-title text-white mb-4">Page Not Found</h2>
            <p class="error-description text-white mb-5 mx-auto">
              The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. 
              Let's get you back on track to building the future.
            </p>
            <div class="d-flex justify-content-center gap-3">
              <a href="javascript:history.back()" class="btn btn-warning text-white fw-bold interactive"><i class="bi bi-arrow-left me-2"></i> Go Back</a>
              <a href="index.html" class="btn btn-warning text-white fw-bold interactive"><i class="bi bi-grid-fill me-2"></i> Go to Dashboard</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/animation.js"></script>
</body>
</html>
